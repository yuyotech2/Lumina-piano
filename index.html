<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Piano | Professional Virtual MIDI Piano</title>
    <meta name="description"
        content="A high-performance virtual piano with MIDI support, glassmorphic design, and studio-quality sound. Play with your mouse or connect your MIDI keyboard.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Tone.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="logo-icon">🎹</span>
                <h1>Lumina<span>Piano</span></h1>
            </div>
            <div class="midi-status" id="midi-status">
                <div class="status-dot"></div>
                <span id="midi-text">No MIDI Device</span>
            </div>
        </header>

        <main>
            <div class="controls-panel glass">
                <div class="control-group">
                    <label>Volume</label>
                    <input type="range" id="volume" min="-60" max="0" value="-10">
                </div>
                <div class="control-group">
                    <label>Instrument</label>
                    <select id="instrument-select">
                        <option value="piano">Grand Piano</option>
                        <option value="epiano">Electric Piano</option>
                        <option value="synth">80s Lead Synth</option>
                        <option value="organ">Church Organ</option>
                    </select>
                </div>
                <div class="control-group">
                    <button id="sustain-btn" class="toggle-btn">Sustain (Space)</button>
                </div>
                <div class="control-group">
                    <div class="recording-controls">
                        <button id="record-btn" class="toggle-btn red-dot">Record</button>
                        <button id="play-btn" class="toggle-btn" disabled>Play</button>
                    </div>
                </div>
                <div class="control-group">
                    <button id="panic-btn" class="toggle-btn">Panic</button>
                </div>
            </div>

            <div class="piano-viewport">
                <div id="piano-container" class="piano-container">
                    <!-- Keys will be generated by JS -->
                </div>
            </div>

            <div class="visualizer-container" id="visualizer">
                <!-- Visual feedback for notes -->
            </div>
        </main>

        <div class="interaction-overlay" id="start-overlay">
            <button id="start-btn">Click to Start Studio</button>
            <p>Experience high-quality audio and MIDI connectivity</p>
        </div>

        <footer>
            <p>&copy; 2024 Lumina Piano Studio. Connect your MIDI device to start playing.</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>

</html>
